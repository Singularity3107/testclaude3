<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Aero Showroom</title>
    <!-- 1. Load Tailwind CSS for the styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. Load Babel to translate the JSX code in real-time -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950">
    <!-- This is where the App will appear -->
    <div id="root"></div>

    <!-- 3. Load your App.jsx file. 
         The 'data-plugins="transform-modules-umd"' helps handle the imports. -->
    <script 
        type="text/babel" 
        data-type="module" 
        data-src="./App.jsx"
        data-plugins="transform-modules-umd">
    </script>

    <script type="text/babel">
        // This small script triggers the render if your App.jsx 
        // doesn't already have a render command at the bottom.
        import Formula1AeroShowroom from './App.jsx';
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Formula1AeroShowroom />);
    </script>
</body>
</html>
