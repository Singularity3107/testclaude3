<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Aero Showroom</title>

    <!-- 1. Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. Import Map: This tells the browser where to find 'react' and 'lucide-react' 
         so your original "import" lines work without a build tool. -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18",
            "react-dom": "https://esm.sh/react-dom@18",
            "react-dom/client": "https://esm.sh/react-dom@18/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
    }
    </script>

    <!-- 3. Babel: This translates JSX (the HTML-like code) into standard JavaScript -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950">
    <div id="root"></div>

    <!-- 4. This script loads your App.jsx and renders it to the screen -->
    <script type="text/babel" data-type="module">
        import React from 'react';
        import { createRoot } from 'react-dom/client';
        import Formula1AeroShowroom from './App.jsx';

        const root = createRoot(document.getElementById('root'));
        root.render(<Formula1AeroShowroom />);
    </script>
</body>
</html>
